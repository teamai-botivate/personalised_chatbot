<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --secondary: #06b6d4;
            --bg: #0f172a;
            --bg-light: #1e293b;
            --border: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #1a1f3a 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-card {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .login-card h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--secondary);
        }

        .login-card p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--text-muted);
        }

        /* Dashboard */
        .dashboard {
            display: none;
            flex: 1;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg) 0%, #1a1f3a 100%);
        }

        .dashboard.active {
            display: flex;
        }

        .dashboard-header {
            background: var(--bg-light);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.5rem;
            color: var(--secondary);
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            font-size: 0.9rem;
        }

        .user-name {
            font-weight: 600;
            color: var(--text);
        }

        .user-id {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .logout-btn {
            background: var(--danger);
            padding: 0.5rem 1rem;
            width: auto;
            font-size: 0.9rem;
        }

        .dashboard-content {
            flex: 1;
            padding: 1.5rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            display: flex;
            gap: 0.75rem;
            animation: slideIn 0.3s ease-out;
            max-width: 85%;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .message.user .message-avatar {
            background: var(--secondary);
        }

        .message-bubble {
            padding: 1rem 1.5rem;
            border-radius: 14px;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            word-wrap: break-word;
            overflow-x: auto;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        .message.user .message-bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-bubble {
            border-bottom-left-radius: 4px;
        }

        .typing {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        .chat-input-area {
            border-top: 1px solid var(--border);
            padding: 1.5rem;
            background: var(--bg-light);
        }

        .input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            padding: 0.9rem 1.2rem;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            max-height: 120px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        textarea:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            animation: slideUp 0.3s ease-out;
            z-index: 1000;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast.error {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        @media (max-width: 768px) {
            .login-card {
                padding: 1.5rem;
            }

            .dashboard-content {
                padding: 1rem;
            }

            .message-bubble {
                max-width: 85%;
            }

            .header-user {
                gap: 0.5rem;
            }

            .user-info {
                display: none;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginContainer" class="login-container active">
        <div class="login-card">
            <h1>Employee Portal</h1>
            <p>Enter your mobile number to continue</p>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="mobileNumber">Mobile Number</label>
                    <input
                        id="mobileNumber"
                        type="tel"
                        placeholder="9801675811"
                        required
                        pattern="[0-9]{10}"
                        title="Enter 10-digit mobile number"
                    >
                    <div class="error" id="loginError"></div>
                </div>
                <button id="loginBtn" type="submit">Login</button>
                <div class="loading" id="loginLoading">Verifying your number...</div>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardContainer" class="dashboard">
        <div class="dashboard-header">
            <div class="header-title">My Portal</div>
            <div class="header-user">
                <div class="user-info">
                    <div class="user-name" id="userName">User</div>
                    <div class="user-id" id="userId">ID</div>
                </div>
                <div class="avatar" id="userAvatar">U</div>
                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            </div>
        </div>
        <div class="dashboard-content">
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <textarea
                            id="messageInput"
                            placeholder="Ask me about your profile, details, or anything else..."
                            rows="1"
                            onkeydown="handleKeyPress(event)"
                        ></textarea>
                        <button class="send-btn" onclick="handleSendMessage()" id="sendBtn">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let authToken = null;
        let userInfo = null;

        // ===== Login =====
        async function handleLogin(e) {
            e.preventDefault();
            const mobileNumber = document.getElementById('mobileNumber').value;
            const errorDiv = document.getElementById('loginError');
            const loginBtn = document.getElementById('loginBtn');
            const loginLoading = document.getElementById('loginLoading');

            errorDiv.textContent = '';
            loginBtn.style.display = 'none';
            loginLoading.style.display = 'block';

            try {
                const response = await fetch(`${API_URL}/auth/verify-mobile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile_number: mobileNumber })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Login failed');
                }

                authToken = data.access_token;
                userInfo = data;

                localStorage.setItem('auth_token', authToken);
                localStorage.setItem('user_info', JSON.stringify(userInfo));

                showDashboard();
                initChat();
            } catch (error) {
                errorDiv.textContent = error.message;
                loginBtn.style.display = 'block';
                loginLoading.style.display = 'none';
            }
        }

        // ===== Dashboard =====
        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboardContainer').classList.add('active');
            document.getElementById('userName').textContent = userInfo.employee_name;
            document.getElementById('userId').textContent = userInfo.employee_id;
            document.getElementById('userAvatar').textContent = userInfo.employee_name.charAt(0).toUpperCase();
        }

        function handleLogout() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user_info');
            location.reload();
        }

        // ===== Plain Text Rendering =====
        function renderPlainText(text) {
            // Just replace newlines with <br> for readability
            return text.replace(/\n/g, '<br>');
        }

        // ===== Chat =====
        let messages = [];

        function initChat() {
            messages = [];
            addMessage('ai', `👋 Welcome, ${userInfo.employee_name.split(' ')[0]}! I'm your personal assistant. I can help you with your profile information and details. What would you like to know?`);
        }

        function addMessage(type, text) {
            messages.push({ type, text, id: Date.now() });
            renderMessages();
        }

        function renderMessages() {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';

            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.type}`;

                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = msg.type === 'ai' ? '🤖' : '👤';

                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';

                // Just render plain text with line breaks
                bubble.innerHTML = renderPlainText(msg.text);

                if (msg.type === 'user') {
                    div.appendChild(bubble);
                    div.appendChild(avatar);
                } else {
                    div.appendChild(avatar);
                    div.appendChild(bubble);
                }

                container.appendChild(div);
            });

            container.scrollTop = container.scrollHeight;
        }

        async function handleSendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            addMessage('ai', '');
            const typingMsgIndex = messages.length - 1;
            renderMessages();

            try {
                const response = await fetch(`${API_URL}/chat/send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ message })
                });

                if (!response.ok) {
                    throw new Error('Failed to get response');
                }

                const data = await response.json();
                messages[typingMsgIndex].text = data.reply;
                renderMessages();
            } catch (error) {
                messages[typingMsgIndex].text = 'Sorry, something went wrong. Please try again.';
                renderMessages();
                showToast(error.message, 'error');
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSendMessage();
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ===== Init =====
        document.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem('auth_token');
            const savedUserInfo = localStorage.getItem('user_info');

            if (savedToken && savedUserInfo) {
                authToken = savedToken;
                userInfo = JSON.parse(savedUserInfo);
                showDashboard();
                initChat();
            }
        });
    </script>
</body>
</html>
